<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em Htm</title>
</head>
<body>
    <h1>imagens dinamica</h1>
    <p>tente abrir este site em varios despositivos
        diferentes ou simplismente aumente o diminua
        o tamnho do seu navegador 
    </p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/g3.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/g2.png" type="image/png">
       <img src="imagens/g1.ppng.jpg" alt="imagem flexivel">

       <h1>Reproduzindo Audio</h1>
       <p>Vamos Aprender a Reproduzir Audio em Html5</p>
       <audio preload="metadata" autoplay controls loop>
        <source src="midia/Pensador Jurilírico feat Chito Kaharam - Abo i Mindjer (Video Oficial 4K) - Pensador Jurilírico.mp3" type="audio/mpeg">
        <source src="midia/Pensador Jurilírico feat Chito Kaharam - Abo i Mindjer (Video Oficial 4K) - Pensador Jurilírico.ogg" type="audio/ogg">
        <source src="midia/Pensador Jurilírico feat Chito Kaharam - Abo i Mindjer (Video Oficial 4K) - Pensador Jurilírico.wav" type="audio/wav">
        <p>Infelizmente o seu computador nao consegue caregar o audio <a href="midia/Pensador Jurilírico feat Chito Kaharam - Abo i Mindjer (Video Oficial 4K) - Pensador Jurilírico.mp3">Clique aque para baixar</a></p>


       </audio>
      

    </picture>
</body>
</html>
